tcp-concurrent: true
unified-delay: true
keep-alive-interval: 30
ipv6: false

mixed-port: 7890
socks-port: 7891
external-controller: 127.0.0.1:9090
mode: rule
log-level: info
allow-lan: true

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "ntp.*"
    - "time.*"
    - "+.mshome.net"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "dns.msftncsi.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
